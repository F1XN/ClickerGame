<!DOCTYPE html>
<html>

<head>
    <title>Clicker Game</title>

<style>

body{
    background:#6b4f2a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

button{
    width:120px;
    height:120px;
    border-radius:50%;
    font-size:32px;
    border:none;
    cursor: pointer;
    transition: transform 0.08s;
    box-shadow: 0 8px #5a3d1c; 
}

button:active{
    transform: scale(0.95) translateY(5px);
    box-shadow: 0 3px #5a3d1c;
}
    </style>
</head>

<body>

<h1>Clicker Game</h1>

<p id="contador">Clics: 0</p>

<button onclick="sumarClic()">
    ¡Haz clic!
</button>

<script>
function sumarClic(){

clics++;

document.getElementById("contador").innerText = "Clics: " + clics;

}
let clics = 0;

</script>

</body>

</html>
